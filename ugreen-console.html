    function deepSortKeysForCompare(v){
      if(v===null||typeof v!=='object')return v;
      if(Array.isArray(v))return v.map(deepSortKeysForCompare);
      const sorted={};
      for(const k of Object.keys(v).sort()){
        sorted[k]=deepSortKeysForCompare(v[k]);
      }
      return sorted;
    }

    function channelConfigFingerprint(cfg){
      const {enabled,...rest}=cfg||{};
      try{
        return JSON.stringify(deepSortKeysForCompare(JSON.parse(JSON.stringify(rest))));
      }catch(_){
        return JSON.stringify(deepSortKeysForCompare(rest));
      }
    }

    async function saveChannel(){
      if(guardRestartPending('保存渠道'))return;
      const id=editingChannelId.value||channelForm.id;
      if(!id){showToast('请选择渠道类型','error');return;}
      const missingChannelParams=[];
      for(const f of channelPluginFields.value){
        const v=channelForm.pluginConfig[f.key];
        if(v===undefined||v===null){
          missingChannelParams.push(f.label||f.key);
          continue;
        }
        if(typeof v==='string'&&v.trim()===''){
          missingChannelParams.push(f.label||f.key);
        }
      }
      if(missingChannelParams.length){
        showToast('请填写：'+missingChannelParams.join('、'),'error');
        return;
      }
      if(!editingChannelId.value){
        const kc=knownChannels.value.find(c=>c.id===id);
        if(kc && kc.loginMode==='weixin_scan'){
          showToast('微信渠道请先完成扫码登录，无法仅通过填表保存','error');
          return;
        }
      }
      const channelConfig={enabled:channelForm.enabled,...channelForm.channelRest,...channelForm.pluginConfig};
      if(!editingChannelId.value&&Object.prototype.hasOwnProperty.call(channels.value,id)){
        const existing=channels.value[id];
        if(channelConfigFingerprint(channelConfig)===channelConfigFingerprint(existing)){
          showToast('该渠道已存在且配置相同，无需重复添加','error');
          return;
        }
      }
      const body={channel:channelConfig};
      try{
        const r=await api('/channels/'+encodeURIComponent(id),{method:'PUT',body});
        if(r.success){
          showToast('保存成功，正在重启 OpenClaw…');
          showChannelModal.value=false;
          startRestartLoading('渠道配置变更');
          loadAll();
        }
        else showToast(r.error||'保存失败','error');
      }catch(e){showToast('请求失败','error');}
    }

    async function deleteChannel(id){
      if(guardRestartPending('删除渠道'))return;
      if(!confirm('确定删除渠道 "'+id+'" ?'))return;
      try{
        const r=await api('/channels/'+encodeURIComponent(id),{method:'DELETE'});
        if(r.success){
          showToast('已删除，正在重启 OpenClaw…');
          startRestartLoading('渠道删除');
          loadAll();
        }
        else showToast(r.error||'删除失败','error');
      }catch(e){showToast('请求失败','error');}
    }

    async function togglePlugin(p,action){
      if(guardPluginTaskBusy(action==='enable'?'启用插件':'停用插件'))return;
      if(guardRestartPending('切换插件状态'))return;
      pluginActionLoading.value=true;
      try{
        const r=await api('/plugins/'+encodeURIComponent(p.id)+'/'+action,{method:'POST'});
        if(r.success){
          showToast((action==='enable'?'已启用':'已停用')+'，正在重启 OpenClaw…');
          startRestartLoading('插件'+(action==='enable'?'启用':'停用'));
          await loadPlugins();
        }else showPluginActionError(r.error,'操作失败');
      }catch(e){showToast('请求失败','error');}
      pluginActionLoading.value=false;
    }

    // 注意：扫码登录成功后不需要调 API 修改 openclaw.json。
    // openclaw CLI 的 `channels login` 命令会自行写入渠道配置
    // （输出 "Config overwrite: ..." 即为 CLI 已完成写入），
    // 控制台只需 ReloadConfig 从磁盘重新加载即可。

    function startWeixinChannelLoginFromChannelModal(){
      showChannelModal.value=false;
      const p=plugins.value.find(x=>x.id==='wechat');
      if(p)startWeixinChannelLogin(p);
    }

    async function startWeixinChannelLogin(p){
      if(guardPluginTaskBusy('执行微信扫码登录'))return;
      if(guardRestartPending('执行微信扫码登录'))return;
      pluginModalMode.value='weixin_login';
      installingPlugin.value=p;
      installPhase.value='installing';
      installMessages.value=[];
      installTermExpanded.value=true;
      qrcodeUrl.value='';
      qrcodeDataUrl.value='';
      qrcodeCountdown.value=0;
      qrcodeExpired.value=false;
      installError.value='';
      pluginInstallRunning.value=true;
      showPluginInstallModal.value=true;

      try{
        const r=await api('/plugins/'+encodeURIComponent(p.id)+'/channel-login',{method:'POST'});
        if(!r.success){
          if(isPluginTaskConflictError(r.error)){
            showToast(normalizePluginTaskConflictError(r.error),'error');
            stopSessionPolling();
            stopCountdown();
            pluginInstallRunning.value=false;
            showPluginInstallModal.value=false;
            return;
          }
          installPhase.value='error';
          installError.value=normalizePluginTaskConflictError(r.error)||'启动失败';
          pluginInstallRunning.value=false;
          return;
        }
        startSessionPolling(p.id);
      }catch(e){
        installPhase.value='error';
        installError.value=e.message||'请求失败';
        pluginInstallRunning.value=false;
      }
    }

    async function startPluginInstall(p){
      if(guardPluginTaskBusy('安装插件'))return;
      if(guardRestartPending('安装插件'))return;
      pluginModalMode.value='install';
      installingPlugin.value=p;
      installPhase.value='installing';
      installMessages.value=[];
      installTermExpanded.value=true;
      qrcodeUrl.value='';
      qrcodeDataUrl.value='';
      qrcodeCountdown.value=0;
      qrcodeExpired.value=false;
      installError.value='';
      pluginInstallRunning.value=true;
      showPluginInstallModal.value=true;

      try{
        const r=await api('/plugins/'+encodeURIComponent(p.id)+'/install',{method:'POST'});
        if(!r.success){
          if(isPluginTaskConflictError(r.error)){
            showToast(normalizePluginTaskConflictError(r.error),'error');
            stopSessionPolling();
            stopCountdown();
            pluginInstallRunning.value=false;
            showPluginInstallModal.value=false;
            return;
          }
          installPhase.value='error';
          installError.value=normalizePluginTaskConflictError(r.error)||'启动失败';
          pluginInstallRunning.value=false;
          return;
        }
        startSessionPolling(p.id);
      }catch(e){
        installPhase.value='error';
        installError.value=e.message||'请求失败';
        pluginInstallRunning.value=false;
      }
    }

    function startSessionPolling(pluginId){
      lastMsgCount=0;
      stopSessionPolling();
      pollSessionStatus(pluginId);
      sessionPollTimer=setInterval(()=>pollSessionStatus(pluginId),1000);
    }

    function stopSessionPolling(){
      if(sessionPollTimer){clearInterval(sessionPollTimer);sessionPollTimer=null;}
    }

    async function pollSessionStatus(pluginId){
      try{
        const r=await api('/plugins/'+encodeURIComponent(pluginId)+'/channel-login/status');
        if(!r.success)return;
        pollErrorCount=0;
        const d=r.data;

        if(d.messages&&d.messages.length>lastMsgCount){
          const newMsgs=d.messages.slice(lastMsgCount);
          for(const m of newMsgs)installMessages.value.push(m);
          if(installMessages.value.length>200)installMessages.value=installMessages.value.slice(-200);
          lastMsgCount=d.messages.length;
          nextTick(()=>{const el=document.getElementById('install-term-box');if(el)el.scrollTop=el.scrollHeight;});
        }

        if(d.phase==='qrcode'&&(installPhase.value!=='qrcode'||qrcodeUrl.value!==d.qrcodeUrl)&&d.qrcodeUrl){
          installPhase.value='qrcode';
          qrcodeUrl.value=d.qrcodeUrl;
          qrcodeExpired.value=false;
          qrcodeDataUrl.value='';
          renderQRCode(d.qrcodeUrl);
          startCountdown(120);
        }

        if(d.phase==='expired'&&!qrcodeExpired.value){
          qrcodeExpired.value=true;
          stopCountdown();
        }

        if(d.phase==='success'&&installPhase.value!=='success'){
          installPhase.value='success';
          stopCountdown();
        }

        if(d.phase==='error'&&installPhase.value!=='error'&&installPhase.value!=='success'){
          installPhase.value='error';
          installError.value=d.error||'未知错误';
        }

        if(d.phase==='done'&&installPhase.value!=='success'&&installPhase.value!=='error'){
          installPhase.value='success';
        }

        if(d.finished){
          stopSessionPolling();
          pluginInstallRunning.value=false;
          stopCountdown();
          loadPlugins();
        }
      }catch(e){
        console.error('pollSessionStatus',e);
      }
    }

    async function renderQRCode(url){
      const apiFallback='https://api.qrserver.com/v1/create-qr-code/?size=360x360&data='+encodeURIComponent(url);
      if(typeof QRCode==='undefined'){
        console.warn('[QR] QRCode lib not loaded, using API fallback');
        qrcodeDataUrl.value=apiFallback;
        return;
      }
      try{
        qrcodeDataUrl.value=await QRCode.toDataURL(url,{width:360,margin:2,color:{dark:'#000000',light:'#ffffff'}});
      }catch(e){
        console.error('[QR] toDataURL failed, using API fallback:',e);
        qrcodeDataUrl.value=apiFallback;
      }
    }

    function startCountdown(seconds){
      stopCountdown();
      qrcodeCountdown.value=seconds;
      countdownInterval=setInterval(()=>{
        qrcodeCountdown.value--;
        if(qrcodeCountdown.value<=0)stopCountdown();
      },1000);
    }

    function stopCountdown(){
      if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
      qrcodeCountdown.value=0;
    }

    function formatCountdown(s){
      if(s<=0)return'0:00';
      const m=Math.floor(s/60),sec=s%60;
      return m+':'+String(sec).padStart(2,'0');
    }

    function confirmInstallSuccess(){
      stopSessionPolling();
      stopCountdown();
      showPluginInstallModal.value=false;
      if(pluginModalMode.value==='install'){
        showToast('安装完成，正在重启 OpenClaw…');
        startRestartLoading('插件安装完成');
      }
      loadAll();
    }

    async function cancelPluginInstall(){
      if(installPhase.value==='success'&&pluginModalMode.value==='install'){
        confirmInstallSuccess();
        return;
      }
      stopSessionPolling();
      stopCountdown();
      showPluginInstallModal.value=false;
      try{
        await loadPlugins();
      }catch(e){}
    }

    async function cancelPluginInstallWithKill(){
      const p=installingPlugin.value;
      if(p&&p.id&&pluginInstallRunning.value){
        try{await api('/plugins/'+encodeURIComponent(p.id)+'/channel-login/cancel',{method:'POST'});}catch(e){}
      }
      pluginInstallRunning.value=false;
      cancelPluginInstall();
    }

    function sendCancelBeacon(){
      const p=installingPlugin.value;
      if(!p||!p.id||!pluginInstallRunning.value)return;
      const url='/ugreen/api/v1/plugins/'+encodeURIComponent(p.id)+'/channel-login/cancel';
      const blob=new Blob(['{}'],{type:'application/json'});
      if(navigator.sendBeacon){
        navigator.sendBeacon(url+'?token='+encodeURIComponent(token.value),blob);
      }else{
        fetch(url,{method:'POST',headers:{'Authorization':token.value},keepalive:true}).catch(()=>{});
      }
    }

    async function uninstallPlugin(p){
      if(guardPluginTaskBusy('卸载插件'))return;
      if(guardRestartPending('卸载插件'))return;
      if(!confirm('确定卸载插件 "'+p.name+'" ?'))return;
      uninstallingPluginId.value=p.id;
      try{
        const r=await api('/plugins/'+encodeURIComponent(p.id)+'/uninstall',{method:'POST'});
        if(r.success){
          showToast('已卸载，正在重启 OpenClaw…');
          startRestartLoading('插件卸载');
          loadAll();
        }
        else showPluginActionError(r.error,'卸载失败');
      }catch(e){showToast('请求失败','error');}
      finally{uninstallingPluginId.value='';}
    }

    async function processAction(action){
      if(action==='restart'&&guardRestartPending('重启服务'))return;
      if(processActionLoading.value)return;
      processActionLoading.value=true;
      processActionType.value=action;
      try{
        const r=await api('/process/'+action,{method:'POST'});
        if(r.success){
          const actionSuccessText={
            start:'启动服务成功',
            stop:'OpenClaw 已停止',
            restart:'OpenClaw 正在重启'
          };
          showToast(actionSuccessText[action]||r.message||'操作成功');
        }
        else showToast(r.error||'操作失败','error');
        setTimeout(pollStatus,1000);
      }catch(e){showToast('请求失败','error');}
      finally{
        processActionLoading.value=false;
        processActionType.value='';
      }
    }

    async function fetchLogs(){
      if(!authenticated.value)return;
      try{
        const r=await api('/process/logs?after='+logLatestSeq.value+'&limit=200');
        if(r.success&&r.data){
          if(r.data.lines&&r.data.lines.length){
            logLines.value.push(...r.data.lines);
            if(logLines.value.length>2000)logLines.value=logLines.value.slice(-2000);
            if(logAutoScroll.value){
              nextTick(()=>{
                const el=document.getElementById('log-container');
                if(el)el.scrollTop=el.scrollHeight;
              });
            }
          }
          if(r.data.latestSeq)logLatestSeq.value=r.data.latestSeq;
        }
      }catch(e){}
    }

    async function bootstrapLatestLogsAndScroll(){
      if(!authenticated.value)return;
      try{
        // 先拿到最新序号，再拉取尾部日志，避免首次进入只看到最早一段日志。
        const head=await api('/process/logs?after=0&limit=1');
        if(!head.success||!head.data){
          await fetchLogs();
          nextTick(()=>{
            const el=document.getElementById('log-container');
            if(el)el.scrollTop=el.scrollHeight;
          });
          return;
        }

        const latestSeq=Number(head.data.latestSeq||0);
        if(!Number.isFinite(latestSeq)||latestSeq<=0){
          logLines.value=[];
          logLatestSeq.value=0;
          return;
        }

        const tailAfter=Math.max(0,latestSeq-200);
        const tail=await api('/process/logs?after='+tailAfter+'&limit=200');
        if(tail.success&&tail.data){
          logLines.value=(tail.data.lines||[]).slice(-2000);
          logLatestSeq.value=Number(tail.data.latestSeq||latestSeq);
        }else{
          await fetchLogs();
        }

        nextTick(()=>{
          const el=document.getElementById('log-container');
          if(el)el.scrollTop=el.scrollHeight;
        });
      }catch(e){}
    }

    async function clearLogs(){
      try{
        await api('/process/logs/clear',{method:'POST'});
        logLines.value=[];
        logLatestSeq.value=0;
      }catch(e){showToast('清空失败','error');}
    }

    function startLogPoll(){
      stopLogPoll();
      if(logLatestSeq.value<=0)bootstrapLatestLogsAndScroll();
      else{
        fetchLogs();
        nextTick(()=>{
          const el=document.getElementById('log-container');
          if(el)el.scrollTop=el.scrollHeight;
        });
      }
      logPollTimer=setInterval(fetchLogs,1000);
    }

    function stopLogPoll(){
      if(logPollTimer){clearInterval(logPollTimer);logPollTimer=null;}
    }

    function formatBytes(b){
      if(b<1024)return b+'B';
      if(b<1048576)return(b/1024).toFixed(1)+' KB';
      if(b<1073741824)return(b/1048576).toFixed(1)+' MB';
      return(b/1073741824).toFixed(2)+' GB';
    }

    function formatUptime(s){
      if(!s)return'-';
      const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
      let r='';
      if(d)r+=d+'d ';
      if(h||d)r+=h+'h ';
      r+=m+'m';
      return r;
    }

    watch(tab,(newTab)=>{
      if(newTab==='process')startLogPoll();
      else stopLogPoll();
    });

    function onBeforeUnload(){sendCancelBeacon();}

    onMounted(()=>{
      const saved=localStorage.getItem('oc_token');
      if(saved){
        token.value=saved;
        api('/process/status').then(r=>{
          if(r.success){authenticated.value=true;loadAll();}
          else localStorage.removeItem('oc_token');
        }).catch(()=>localStorage.removeItem('oc_token'));
      }
      pollTimer=setInterval(pollStatus,3000);
      window.addEventListener('beforeunload',onBeforeUnload);
    });

    onUnmounted(()=>{clearInterval(pollTimer);stopLogPoll();stopSessionPolling();window.removeEventListener('beforeunload',onBeforeUnload);});

    return{
      authenticated,tokenInput,loginError,tab,token,pageTitle,
      providers,channels,processStatus,defaultModel,allModelOptions,knownProviders,knownProvidersForDisplay,knownChannels,knownChannelsForAdd,
      showProviderModal,editingProviderId,selectedKnownProvider,providerForm,
      showModelEditModal,editingModelIdx,modelEditForm,
      showChannelModal,editingChannelId,selectedKnownChannel,channelForm,channelPluginFields,
      plugins,pluginActionLoading,uninstallingPluginId,restartPending,restartReason,
      showPluginInstallModal,installingPlugin,pluginModalMode,pluginInstallRunning,
      installPhase,installMessages,installTermExpanded,qrcodeUrl,qrcodeDataUrl,qrcodeCountdown,qrcodeExpired,installError,formatCountdown,
      wechatPluginReady,isWeixinScanChannel,startWeixinChannelLogin,startWeixinChannelLoginFromChannelModal,
      logLines,logAutoScroll,
      pluginRefreshLoading,pluginTaskBusy,pluginBlockingBusy,
      toast,
      showResetConfirmModal,resetLoading,doResetConfig,showDangerZone,
      processActionLoading,processActionType,
      beginOverlayClose,endOverlayClose,cancelOverlayClose,
      doLogin,doLogout,loadAll,pollStatus,refreshPluginsWithFeedback,
      openProviderModal,applyKnownProvider,saveProvider,deleteProvider,saveDefaultModel,
      openModelEdit,saveModelEdit,removeModel,
      openChannelModal,applyKnownChannel,saveChannel,deleteChannel,channelTableDisplayName,
      loadPlugins,togglePlugin,startPluginInstall,confirmInstallSuccess,cancelPluginInstall,cancelPluginInstallWithKill,uninstallPlugin,
      processAction,clearLogs,formatBytes,formatUptime
    };
  }
}).mount('#app');
</script>
