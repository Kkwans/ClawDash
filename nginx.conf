events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml application/wasm;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 上游：Gateway
    upstream gateway {
        server 192.168.5.110:19001;
    }

    # 上游：绿联 API
    upstream ugreen_api {
        server 192.168.5.110:18799;
    }

    server {
        listen 8088;
        server_name _;

        # 绿联 API 代理
        location /api/ {
            proxy_pass http://ugreen_api/ugreen/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        # 健康检查
        location /healthz {
            proxy_pass http://gateway;
        }

        # 内置 Control UI（HTTP + WebSocket）
        location /builtin/ {
            proxy_pass http://gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            sub_filter_types text/html application/javascript;
            sub_filter_once off;
            sub_filter '18789' '19001';
        }

        # Gateway WebSocket 代理（/ws 路径）
        location /ws {
            proxy_pass http://gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # 安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ClawDash 静态文件
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 带 hash 的静态资源长期缓存
        location /assets/ {
            root /usr/share/nginx/html;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # 字体文件长期缓存
        location ~* \.(woff2?|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 365d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
        }

        # favicon/icons 不缓存
        location ~* \.(svg|ico)$ {
            root /usr/share/nginx/html;
            expires 1h;
        }
    }
}
