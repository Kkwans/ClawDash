events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8088;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /ugreen/ {
            proxy_pass http://192.168.5.110:18799/ugreen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location /api/ {
            proxy_pass http://192.168.5.110:18799/ugreen/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location /healthz {
            proxy_pass http://192.168.5.110:19001;
        }

        location /builtin/ {
            proxy_pass http://192.168.5.110:19001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            sub_filter_types text/html application/javascript;
            sub_filter_once on;
            sub_filter "ws://127.0.0.1:18789" "ws://$host:8088/ws";
            sub_filter "</body>" "<a href=\"/\" style=\"position:fixed;top:12px;left:12px;z-index:99999;background:rgba(59,130,246,0.95);color:white;padding:8px 16px;border-radius:8px;font-size:13px;font-family:system-ui,sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;align-items:center;gap:6px;text-decoration:none;\">🦞 返回控制台</a></body>";
        }

        location /ws {
            proxy_pass http://192.168.5.110:19001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
